<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sins Ice2 - Portfólio</title>
    <style>
        /* TRAVAS DE SEGURANÇA E GERAL */
        * { -webkit-user-select: none; user-select: none; }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: url('fundosite.webp') no-repeat center top fixed;
            background-size: 125%;
            color: #bc13fe; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
        }

        .header-logo { max-width: 350px; margin: 0 auto 15px auto; }
        .header-logo img { width: 100%; height: auto; display: block; }

        .subtitle {
            font-size: 1rem;
            color: #bc13fe;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(188, 19, 254, 0.5);
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .info-box {
            background: rgba(22, 22, 22, 0.85); 
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        h2 { 
            color: #bc13fe; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.7);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* EFEITO DIAMONDY NOS CARDS */
        .gallery-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(188, 19, 254, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .gallery-item:hover { 
            transform: translateY(-10px) scale(1.03); 
            border-color: #bc13fe; 
            box-shadow: 0 10px 25px rgba(188, 19, 254, 0.5);
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            transition: 0.4s;
        }

        .gallery-item:hover img { transform: scale(1.05); }

        .gallery-caption {
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #lightbox img, #lightbox video {
            max-width: 90%;
            max-height: 90%;
            border: 2px solid #bc13fe;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.5);
        }

        .actions { text-align: center; padding: 40px 0; }
        .btn-gif { display: inline-block; transition: transform 0.3s ease; max-width: 400px; cursor: pointer; }
        .btn-gif:hover { transform: scale(1.1); }
        .btn-gif img { width: 100%; height: auto; border-radius: 10px; }

        footer {
            text-align: center;
            padding: 40px;
            color: #bc13fe;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(188, 19, 254, 0.3);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="click-sound" src="click.mp3" preload="auto"></audio>
    <audio id="select-sound" src="select.mp3" preload="auto"></audio>

    <header>
        <div class="header-logo">
            <img src="logo sinsice2 site.webp" alt="Sins Ice2 Logo">
        </div>
        <div class="subtitle">13 anos • YouTuber • Animador • Compositor • Designer</div>
    </header>

    <div class="container">
        
        <div class="info-box">
            <h2>Galeria de Projetos</h2>
            <div class="skills-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px;">
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎬 Animação</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎵 Composição</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎨 Arte Digital</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">✒️ Design</div>
            </div>

            <div class="gallery-grid">
                <div class="gallery-item" onclick="playSelect(); openLightboxVideo('bixo de espada.mp4')">
                    <video autoplay loop muted playsinline>
                        <source src="bixo de espada.mp4" type="video/mp4">
                    </video>
                    <div class="gallery-caption">Minhas Animações</div>
                </div>

                <div class="gallery-item" onclick="playSelect(); openLightbox(this)">
                    <img src="soldado.webp" alt="Soldado Zoiudo">
                    <div class="gallery-caption">Ilustrações</div>
                </div>

                <div class="gallery-item" onclick="playSelect(); openLightbox(this)">
                    <img src="Design1.webp" alt="Meu Design">
                    <div class="gallery-caption">Assets & Design</div>
                </div>
            </div>
        </div>

        <div class="info-box">
            <h2>Meus Jogos (HTML)</h2>
            <div class="gallery-grid">
                
                <div class="gallery-item" onclick="playSelect(); window.open('SEU_JOGO.html', '_blank');">
                    <img src="Design1.webp" alt="Thumbnail do Jogo">
                    <div class="gallery-caption">JOGAR AGORA</div>
                </div>

            </div>
        </div>

        <div class="actions">
            <a href="https://www.youtube.com/@Sinsice2" target="_blank" class="btn-gif">
                <img src="vireumgelo.GIF" alt="Se inscreva no canal - Vire um Gelo">
            </a>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" style="display:none;">
        <video id="lightbox-video" controls loop style="display:none;"></video>
    </div>

    <footer>
        <p>&copy; 2026 SINS ICE2 - Todos os direitos reservados.</p>
    </footer>

    <script>
        const clickSound = document.getElementById('click-sound');
        const selectSound = document.getElementById('select-sound');

        function playSelect() {
            if (selectSound) {
                selectSound.currentTime = 0;
                selectSound.play().catch(e => console.log("Aguardando interação"));
            }
        }

        // Ativa os sons no primeiro clique
        document.body.addEventListener('click', function() {
            clickSound.load();
            selectSound.load();
        }, { once: true });

        function openLightbox(element) {
            const imgSrc = element.querySelector('img').src;
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            const lbVid = document.getElementById('lightbox-video');
            lbVid.style.display = 'none';
            lbVid.pause();
            lbImg.src = imgSrc;
            lbImg.style.display = 'block';
            lb.style.display = 'flex';
        }

        function openLightboxVideo(videoSrc) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            const lbVid = document.getElementById('lightbox-video');
            lbImg.style.display = 'none';
            lbVid.src = videoSrc;
            lbVid.style.display = 'block';
            lb.style.display = 'flex';
            lbVid.play();
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            const lbVid = document.getElementById('lightbox-video');
            lb.style.display = 'none';
            lbVid.pause();
        }
    </script>
</body>
</html>
